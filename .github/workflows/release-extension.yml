name: Sign & attach extension XPI

# Produces a Mozilla-signed .xpi (unlisted self-distribution) and attaches it to
# the GitHub release, so phone users can install it on Firefox for Android.
#
# Requires two repo secrets from a free addons.mozilla.org account
# (Settings → Secrets and variables → Actions):
#   WEB_EXT_API_KEY     — AMO "JWT issuer"
#   WEB_EXT_API_SECRET  — AMO "JWT secret"
#
# Tag releases with a semver tag like v1.2.0 — the .xpi version is taken from the
# tag (AMO rejects re-uploading an already-signed version, so bump the tag each time).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version for the .xpi (semver, e.g. 1.2.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: sign-extension-${{ github.event.release.tag_name || github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # web-ext only — avoids installing Playwright (and its browser download).
      - name: Install web-ext
        run: npm install -g web-ext@10

      - name: Determine version (from release tag or manual input)
        id: ver
        run: |
          RAW="${{ github.event.release.tag_name || github.event.inputs.version }}"
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp manifest version + sync extension files
        run: |
          node -e "const f='extension/manifest.json',m=require('./'+f);m.version=process.argv[1];require('fs').writeFileSync(f,JSON.stringify(m,null,2)+'\n')" "${{ steps.ver.outputs.version }}"
          node scripts/sync-extension.js

      - name: Sign with AMO (unlisted)
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: web-ext sign --source-dir extension --channel=unlisted --artifacts-dir dist

      - name: Attach .xpi to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.xpi --clobber

      - name: Upload .xpi as build artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: signed-xpi
          path: dist/*.xpi
